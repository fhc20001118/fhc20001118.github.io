      <p>1、当要删除头结点时，可以给链表增加一个虚拟的空头结点</p>
<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">ListNode *dummyHead = <span class="keyword">new</span> <span class="built_in">Listnode</span>(<span class="number">0</span>);</span><br><span class="line">dummyHead-&gt;next = head;</span><br></pre></td></tr></table></figure>

<p>2、用双指针找链表的相交结点时</p>
<p>这一段代码千万别写成pA-&gt;next == nullptr,因为这样会跳过当他们没有交点的时候，事实上不管两个链表是不是会相交，pA和pB都会相遇，但是当两个链表不相交时，他们同时为nullptr罢了，如果用 pA-&gt;next == nullptr来判断的话，会跳过他们同时等于 nullptr 的情况</p>
<figure class="highlight c++"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">while</span> (pA != pB) &#123;</span><br><span class="line">            pA = pA == <span class="literal">nullptr</span>? headB : pA-&gt;next;</span><br><span class="line">            pB = pB == <span class="literal">nullptr</span>? headA : pB-&gt;next;</span><br><span class="line">        &#125;</span><br></pre></td></tr></table></figure>
